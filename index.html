<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B244D">
<title>FPN Contabilidade — Contador na Grande João Pessoa</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:radial-gradient(1000px 600px at 80% -10%,#1a4a92,#0B244D 45%,#071A38);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.logo-mark{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#123B7A,#A7CF46);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:700;font-size:1.3rem;margin:0 auto 22px}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.9rem;margin-bottom:10px}
p.sub{color:rgba(255,255,255,.7);margin-bottom:36px;max-width:420px}
.grid{display:grid;gap:14px;width:100%;max-width:420px}
a.city{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:20px 24px;color:#fff;text-decoration:none;font-weight:700;font-size:1.1rem;transition:.25s;backdrop-filter:blur(6px)}
a.city:hover{background:rgba(167,207,70,.14);border-color:#A7CF46;transform:translateY(-2px)}
a.city span.ar{width:34px;height:34px;border-radius:50%;background:#A7CF46;color:#0B244D;display:grid;place-items:center;font-weight:800}
small.tag{display:block;color:rgba(255,255,255,.55);font-size:.85rem;font-weight:500;margin-top:28px}
</style>
</head>
<body>
  <div class="logo-mark">FPN</div>
  <h1>FPN Contabilidade</h1>
  <p class="sub">Contabilidade estratégica na Grande João Pessoa. Escolha sua cidade:</p>
  <div class="grid">
    <a class="city" href="./contador-joao-pessoa/">Contador João Pessoa <span class="ar">›</span></a>
    <a class="city" href="./contador-cabedelo/">Contador Cabedelo <span class="ar">›</span></a>
    <a class="city" href="./contador-bayeux/">Contador Bayeux <span class="ar">›</span></a>
    <a class="city" href="./contador-santa-rita/">Contador Santa Rita <span class="ar">›</span></a>
  </div>
  <small class="tag">FPN Contabilidade e Soluções Empresariais · Grande João Pessoa</small>
</body>
</html>
